# 파일 이름은 반드시 LoadFolders.Build.yaml이어야 합니다.
# 예시 파일을 그대로사용하는 경우 파일 이름에서 .Example을 제거하고, 용량 절약을 위해 주석을 지우기 바랍니다.
BuildRule:
  Binding:
    PackageID: [fe.sefse, sfe.sefsef, sef.fsaq] # 이 패키지ID를 가진 모드를 로드할 때 함께 로드합니다. []로 입력.
    Mode: # All인 경우 PackageID에 해당하는 모든 모드가 로드되어야 로드합니다. Any인 경우 그 중 하나만 로드되어도 로드합니다. PacakageID가 두 개 이상인 경우 필수입니다.
    Dependency: Independent # Independent인 경우 모든 규칙을 그대로 적용하며, 하위 경로에는 Dependent 규칙만 존재할 수 있습니다. Dependent인 경우 상위 Independent 규칙이 가리키는 폴더를 로드할 때 함께 로드합니다.
  Order: # 아래 속성에 PackageID를 배열로 지정할 경우 로드 순서를 조절할 수 있습니다. []로 입력.
    After:
    Before:    
  Version: # 버전을 적을 땐 항상 큰따옴표로 감싸세요. 여기에는 적지 않습니다.
    <->: "1.6" # 이 버전에는 이 폴더를 로드하도록 고정합니다. 다른 BuildRule 설정에 의해 막히지 않는다면 전후 버전에도 이 폴더를 로드합니다.
    |->: "1.3" # 이 버전보다 앞 버전에는 로드하지 않습니다.
    <-|: "1.8" # 이 버전보다 뒤 버전에는 로드하지 않습니다.
    |-|: # 이 버전에만 로드합니다. []로 입력.
    |x|: # 이 버전에는 로드하지 않습니다. []로 입력.